name: Snake Animation
on:
  schedule: [{ cron: "0 12 * * *" }]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: najmulcodes
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

Click **Commit changes**

---

**Step 4 — Run it manually the first time**
- Go to your repo → click the **Actions** tab
- You'll see **Snake Animation** in the left sidebar — click it
- Click the **Run workflow** button (top right) → **Run workflow**
- Wait ~30 seconds for it to finish ✅

